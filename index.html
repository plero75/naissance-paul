<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Félicitations Jad - Papa du petit mystère !</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00, #ff0000, #00ff00, #0000ff);
            background-size: 400% 400%;
            animation: rainbow 5s ease infinite;
            font-family: 'Comic Neue', cursive;
            color: #fff;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .disco-ball {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #fff 10%, #ffd700 20%, #ff4500 30%, #ff1493 40%, transparent 50%);
            border-radius: 50%;
            animation: rotate 10s linear infinite, shine 2s ease-in-out infinite alternate;
            box-shadow: 0 0 50px #fff, inset 0 0 50px rgba(255,255,255,0.5);
            z-index: 10;
        }
        @keyframes rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes shine {
            0% { box-shadow: 0 0 50px #fff, inset 0 0 50px rgba(255,255,255,0.5); }
            100% { box-shadow: 0 0 100px #ffff00, inset 0 0 100px #ffff00; }
        }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        h1 {
            font-size: 4em;
            text-shadow: 0 0 20px #fff, 0 0 40px #ff00ff, 0 0 60px #00ffff;
            animation: glow 2s ease-in-out infinite alternate;
            margin: 0;
            z-index: 20;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #fff, 0 0 40px #ff00ff, 0 0 60px #00ffff; }
            to { text-shadow: 0 0 30px #fff, 0 0 60px #ffff00, 0 0 90px #00ff00; }
        }
        p {
            font-size: 1.5em;
            text-shadow: 0 0 10px #fff;
            animation: bounce 2s infinite;
            margin: 20px 0;
            z-index: 20;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        .date {
            font-size: 2em;
            color: #ffff00;
            text-shadow: 0 0 20px #ff0000;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .gold-zone {
            position: relative;
            display: inline-block;
            margin: 30px 0;
            cursor: pointer;
            z-index: 20;
        }
        .gold-cover {
            width: 350px;
            height: 140px;
            background: linear-gradient(45deg, #ffd700, #ffed4e, #ffd700);
            border: 8px solid #ffaa00;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.6em;
            font-weight: bold;
            color: #7a4f00;
            text-shadow: 3px 3px 6px #b8860b;
            box-shadow: 0 15px 40px rgba(255,215,0,0.9), inset 0 8px 15px rgba(255,255,255,0.6);
            transition: all 0.4s ease;
            animation: goldShine 3s ease-in-out infinite alternate;
            user-select: none;
            padding: 20px;
            box-sizing: border-box;
        }
        @keyframes goldShine {
            from { box-shadow: 0 15px 40px rgba(255,215,0,0.9), inset 0 8px 15px rgba(255,255,255,0.6); }
            to { box-shadow: 0 25px 60px rgba(255,215,0,1), inset 0 15px 25px rgba(255,255,255,0.9); }
        }
        .prenom-revele {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5em;
            color: #ff00ff;
            text-shadow: 0 0 40px #ffff00, 0 0 60px #ff1493, 0 0 80px #00ffff;
            opacity: 0;
            transition: all 0.6s ease;
            z-index: 30;
            pointer-events: none;
            font-weight: bold;
            white-space: nowrap;
        }
        .revele .prenom-revele {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.3);
        }
        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: 3px solid #ffff00;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 50;
        }
        .instruction {
            font-size: 1.1em;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
        }
        .secret-text { font-size: 1.1em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <canvas id="sparkles"></canvas>
    <div class="disco-ball"></div>
    <h1>🎉 FÉLICITATIONS JAD ! 🎉</h1>
    <p class="date">Papa du bébé né le 12 avril 2026</p>
    <div class="gold-zone" id="goldZone">
        <div class="gold-cover">
            <div class="secret-text">✨ LE SECRET DU PRÉNOM EST ICI ! ✨</div>
            <div>👆 Passez le doigt sur la zone en OR ! 👆</div>
        </div>
        <div class="prenom-revele">PAUL 🌟</div>
    </div>
    <p>Le plus beau bébé du monde t'attend ! 💖🍼</p>
    <p class="instruction">Swipe ou cliquez la zone dorée pour découvrir le prénom !</p>
    <button class="music-btn" id="musicBtn">🎵</button>
    <audio id="bgMusic" loop preload="auto" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <script>
        const canvas = document.getElementById('sparkles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const sparkles = [];
        for (let i = 0; i < 150; i++) {
            sparkles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2, life: Math.random()*2});
        }
        function animateSparkles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            sparkles.forEach(s => {
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(s.life * Math.PI);
                ctx.fillStyle = `hsl(${s.life*60},100%,70%)`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(-3, -3, 6, 6);
                ctx.restore();
                s.x += s.vx; s.y += s.vy; s.life += 0.05;
                if (s.life > 2 || s.x < 0 || s.x > canvas.width || s.y < 0 || s.y > canvas.height) {
                    s.x = Math.random()*canvas.width; s.y = Math.random()*canvas.height;
                    s.vx = (Math.random()-0.5)*2; s.vy = (Math.random()-0.5)*2; s.life = 0;
                }
            });
            requestAnimationFrame(animateSparkles);
        }
        animateSparkles();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        const goldZone = document.getElementById('goldZone');
        let revealed = false;
        function revealPrenom() {
            if (!revealed) {
                goldZone.classList.add('revele');
                revealed = true;
                if (navigator.vibrate) navigator.vibrate(300);
                for (let i = 0; i < 100; i++) {
                    setTimeout(() => {
                        const idx = Math.floor(Math.random()*sparkles.length);
                        sparkles[idx].vx *= 3; sparkles[idx].vy *= 3; sparkles[idx].life = 0;
                    }, i * 20);
                }
            }
        }
        goldZone.addEventListener('click', revealPrenom);
        let startX, startY, isDragging = false;
        goldZone.addEventListener('touchstart', e => { e.preventDefault(); startX = e.touches[0].clientX; startY = e.touches[0].clientY; revealPrenom(); }, {passive: false});
        goldZone.addEventListener('touchmove', e => {
            if (!revealed && startX && (Math.abs(e.touches[0].clientX-startX)>15 || Math.abs(e.touches[0].clientY-startY)>15)) revealPrenom();
        });
        goldZone.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mousemove', () => { if (isDragging && !revealed) revealPrenom(); });
        document.addEventListener('mouseup', () => isDragging = false);

        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        bgMusic.volume = 0.3;
        let isPlaying = false;
        musicBtn.addEventListener('click', async () => {
            try {
                if (isPlaying) { bgMusic.pause(); musicBtn.textContent = '🎵'; }
                else { await bgMusic.play(); musicBtn.textContent = '⏸️'; }
                isPlaying = !isPlaying;
            } catch(e) { console.log('Audio blocked'); }
        });
    </script>
</body>
</html>
